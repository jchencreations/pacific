<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">

  <style>
    /* Faster animation */
    .layer1 { animation: move1 19s linear infinite; }/*Furthest*/
    .layer2 { animation: move2 15s linear infinite; }
    .layer3 { animation: move3 11s linear infinite; }
    .layer4 { animation: move4 7s linear infinite; }
    .layer5 { animation: move5 5s linear infinite; }
    .layer6 { animation: move6 3s linear infinite; } /*Closest*/

    @keyframes move1 { from { transform: translateX(0); } to { transform: translateX(-1920px); } }
    @keyframes move2 { from { transform: translateX(0); } to { transform: translateX(-1920px); } }
    @keyframes move3 { from { transform: translateX(0); } to { transform: translateX(-1920px); } }
    @keyframes move4 { from { transform: translateX(0); } to { transform: translateX(-1920px); } }
    @keyframes move5 { from { transform: translateX(0); } to { transform: translateX(-1920px); } }
    @keyframes move6 { from { transform: translateX(0); } to { transform: translateX(-1920px); } }
  </style>

